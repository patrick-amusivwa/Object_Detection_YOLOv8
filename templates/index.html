<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lane Detection</title>

    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png" type="image/x-icon" />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap" rel="stylesheet" />

    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <style>
      body {
        background: linear-gradient(to right, #0d0d1a, #1a1a40);
        color: #f0f4f8;
        font-family: 'Rubik', sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      nav, footer {
        background-color: #0a0a23;
      }

      nav .navbar-brand {
        color: #00ffe7;
        font-weight: 600;
        font-size: 22px;
        text-shadow: 0 0 5px #00ffe7;
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        text-align: center;
      }

      .main-content h1 {
        font-size: 42px;
        color: #00ffe7;
        margin-bottom: 10px;
        text-shadow: 0 0 8px #00ffe7;
      }

      .main-content p {
        font-style: italic;
        color: #ccc;
        margin-bottom: 30px;
      }

      .upload-section {
        background-color: #12122a;
        border-radius: 15px;
        padding: 30px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 0 20px rgba(0, 255, 231, 0.15);
        color: #ffffff;
      }

      .custom-file-label {
        font-weight: 600;
        background-color: #7f5af0;
        border: 2px solid #7f5af0;
        border-radius: 10px;
        padding: 10px;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .custom-file-label:hover {
        background-color: #624bd4;
      }

      .upload-btn {
        margin-top: 20px;
        width: 100%;
        background: linear-gradient(to right, #00ffe7, #7f5af0);
        color: white;
        padding: 12px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px #00ffe7;
      }

      .upload-btn:hover {
        transform: translateY(-2px);
        background: linear-gradient(to right, #7f5af0, #00ffe7);
        box-shadow: 0 0 15px #7f5af0;
      }

      .result-images {
        margin-top: 30px;
      }

      .result-images img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border-radius: 12px;
        margin-top: 15px;
        box-shadow: 0 0 12px rgba(0, 255, 231, 0.2);
      }

      h4, h5 {
        color: #00ffe7;
        text-shadow: 0 0 6px #00ffe7;
      }

      footer {
        color: #888;
        text-align: center;
        padding: 15px 10px;
        font-size: 15px;
      }

      footer a {
        color: #00ffe7;
        margin: 0 10px;
        text-decoration: none;
        transition: 0.3s;
      }

      footer a:hover {
        color: #ffffff;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
      <div class="container justify-content-center">
        <span class="navbar-brand font-weight-bold">CD-UNET ARCHITECTURE FOR LANE DETECTION</span>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <h1>Lane Detection Using Cascaded U-NET</h1>
      <p>"Upload a road image to detect the lane!"</p>

      <div class="upload-section">
        <form type="upload" method="POST" enctype="multipart/form-data">
          <div class="custom-file mb-3">
            <input type="file" name="file" accept="image/*" class="custom-file-input" id="customFile" required />
            <label class="custom-file-label" for="customFile">Choose Image</label>
          </div>
          <button type="submit" class="upload-btn">Predict Lane</button>
        </form>
        <div id="status-message" class="mt-3 text-info font-weight-bold"></div>

        {% if uploaded %}
        <div class="result-images">
          <h4 class="mt-4">Prediction Results</h4>
          <div class="row mt-3">
            <div class="col-md-6">
              <h5>Original Image</h5>
              <img src="{{ img_path }}" alt="Original" />
            </div>
            <div class="col-md-6">
              <h5>Predicted Lane</h5>
              <img src="{{ mask_path }}" alt="Predicted" />
            </div>
          </div>
        </div>
        {% endif %}
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div>
        <i class="fas fa-road"></i> © 2025 Lane Detection AI. All rights reserved.
      </div>
      <div>
        Created by <strong>Akshwin T</strong> |
        <a href="https://github.com/akshwin" target="_blank"><i class="fab fa-github"></i> GitHub</a>
        <a href="https://www.linkedin.com/in/akshwin/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <!-- Upload Status Script -->
    <script>
      const form = document.querySelector('form');
      const statusMessage = document.getElementById('status-message');

      form.addEventListener('submit', function () {
        statusMessage.textContent = 'Predicting...';
        statusMessage.classList.remove('text-success');
        statusMessage.classList.add('text-info');
      });

      window.addEventListener('load', () => {
        {% if uploaded %}
          statusMessage.textContent = 'Predicted!';
          statusMessage.classList.remove('text-info');
          statusMessage.classList.add('text-success');
        {% endif %}
      });
    </script>
  </body>
</html>
